<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio4</title>
    <style>
        .fondoBarra{
            display: flex;
            background-color: darkgrey;
            width: 100%;
            height: 20px;
            margin-bottom: 5px;
        }
        #barra{
            background-color: green;
            width: 0px;
        }
        #btn{
            width: 100px;
            height: 30px;
        }
    </style>
</head>
<body>
    <section class="fondoBarra">
        <div id="barra"></div>
    </section>
    <p id="mensaje">¡Completado!</p>
    <button id="btn" onclick="iniciar()">Iniciar</button>
    <script>
        const barra = document.getElementById("barra")
        const mensaje = document.getElementById("mensaje")
        let intervalo = null
        let ancho = 0
        mensaje.style.visibility = "hidden"
        function iniciar(){
            if(barra.offsetWidth === 0 || ancho >= 100){
                barra.style.width = 0 + "%"
                mensaje.style.visibility = "hidden"
                ancho = 0
                intervalo = setInterval(aumentar, 100)
            }
        }
        function aumentar(){
            ancho += 1
            barra.style.width = ancho + "%"
            if(ancho >= 100){
                mensaje.style.visibility = "visible"
                clearInterval(intervalo)
            }
        }
    </script>
</body>
</html>
