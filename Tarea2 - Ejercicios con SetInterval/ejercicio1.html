<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio1</title>
</head>

<body>
    <p id="reloj"></p>
    <script>
        const reloj = document.getElementById("reloj")
        let hora
        function actualizar(){
            hora = new Date()
            reloj.innerHTML = hora.toLocaleTimeString()
        }
        setInterval(actualizar, 1000);
    </script>
</body>

</html>
